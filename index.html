<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>LiteTube Modern</title>
    
    <link rel="preconnect" href="https://img.youtube.com">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #0f0f0f;
            --text-sub: #606060;
            --accent: #ff0000;
            --border: #e5e5e5;
            --chip-bg: #f2f2f2;
            --chip-bg-hover: #e5e5e5;
            --header-bg: rgba(255, 255, 255, 0.98);
        }

        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --text-main: #f1f1f1;
            --text-sub: #aaaaaa;
            --accent: #ff0000;
            --border: #272727;
            --chip-bg: #272727;
            --chip-bg-hover: #3f3f3f;
            --header-bg: rgba(15, 15, 15, 0.98);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 0; overflow: hidden; height: 100vh; height: 100dvh;
        }

        header {
            background: var(--header-bg); border-bottom: 1px solid var(--border);
            padding: 10px 16px; display: flex; flex-direction: column; gap: 12px;
            position: relative; z-index: 10;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .logo { 
            font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 4px; cursor: pointer; letter-spacing: -0.5px;
        }
        .logo span { background: var(--accent); color: white; padding: 2px 6px; border-radius: 6px; font-size: 14px; }
        
        .header-actions { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; color: var(--text-main); font-size: 18px; cursor: pointer; padding: 0; }

        .search-bar-container { display: flex; gap: 8px; }
        .search-box {
            display: flex; background: var(--chip-bg); border: 1px solid var(--border);
            border-radius: 40px; padding: 0 16px; height: 36px; align-items: center; flex-grow: 1;
        }
        .search-box input {
            flex-grow: 1; border: none; background: transparent; color: var(--text-main);
            font-size: 15px; outline: none; width: 100%;
        }
        .search-btn {
            background: var(--chip-bg); border: none; border-radius: 40px;
            padding: 0 16px; height: 36px; color: var(--text-main); cursor: pointer; font-weight: 500;
        }

        .chips-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;
        }
        .chips-container::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--chip-bg); color: var(--text-main); padding: 6px 12px;
            border-radius: 8px; font-size: 14px; white-space: nowrap; cursor: pointer; border: none;
        }
        .chip.active { background: var(--text-main); color: var(--bg-color); }

        .main-content {
            height: calc(100vh - 150px); overflow-y: auto; padding: 0; margin-bottom: 50px;
        }

        .video-card { cursor: pointer; margin-bottom: 16px; }
        .video-card:active { opacity: 0.7; }
        
        .thumb { position: relative; width: 100%; padding-top: 56.25%; background: var(--border); }
        .thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .meta-container { display: flex; gap: 12px; padding: 12px 16px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--chip-bg); flex-shrink: 0; }
        .meta { display: flex; flex-direction: column; }
        .title { font-size: 16px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .channel { font-size: 14px; color: var(--text-sub); }

        .player-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 200; flex-direction: column; }
        .player-header { padding: 12px 16px; display: flex; justify-content: space-between; background: #0f0f0f; border-bottom: 1px solid #272727; }
        .player-header button { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .player-controls { padding: 16px; display: flex; justify-content: center; gap: 10px; background: #0f0f0f; flex-grow: 1;}
        .switch-btn { background: #272727; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: var(--header-bg);
            border-top: 1px solid var(--border); display: flex; z-index: 100;
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main); font-size: 10px; cursor: pointer; opacity: 0.5; }
        .tab-item.active { opacity: 1; font-weight: 500; }
        .msg-box { text-align: center; color: var(--text-sub); padding: 40px 20px; font-size: 15px; }
    </style>
</head>
<body data-theme="dark">

<header>
    <div class="header-top">
        <div class="logo" onclick="initLoad('')">Lite<span>Tube</span></div>
        <div class="header-actions">
            <button class="action-btn" onclick="toggleTheme()">🌗</button>
            <button class="action-btn" onclick="toggleProxy()" id="proxy-btn">🛡️</button>
        </div>
    </div>
    <div class="search-bar-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Введите запрос...">
        </div>
        <button class="search-btn" onclick="triggerSearch()">Поиск</button>
    </div>
    <div class="chips-container">
        <button class="chip active" onclick="setFilter('', this)">В тренде</button>
        <button class="chip" onclick="setFilter('shorts', this)">Shorts</button>
        <button class="chip" onclick="setFilter('music', this)">Музыка</button>
        <button class="chip" onclick="setFilter('gaming', this)">Игры</button>
    </div>
</header>

<div id="main-view" class="main-content"></div>

<div id="player-modal" class="player-modal">
    <div class="player-header">
        <button onclick="closePlayer()">✕ Назад</button>
        <span style="color:#fff; font-size:14px; opacity:0.5;">Плеер</span>
        <div style="width: 50px;"></div>
    </div>
    <div class="video-wrapper" id="player-target"></div>
    <div class="player-controls">
        <button class="switch-btn" onclick="switchPlayerType('piped')">Прокси плеер</button>
        <button class="switch-btn" onclick="switchPlayerType('youtube')">Оригинал (YT)</button>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="initLoad('')">Главная</div>
    <div class="tab-item" onclick="setFilter('shorts', document.querySelectorAll('.chip')[1])">Shorts</div>
</nav>

<script>
    let isProxy = true;
    let currentVideoId = null;

    const API_URLS = [
        "https://pipedapi.kavin.rocks/",
        "https://pipedapi.tokhmi.xyz/",
        "https://pipedapi.smnz.de/"
    ];

    function toggleTheme() {
        const root = document.body;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleProxy() {
        isProxy = !isProxy;
        document.getElementById('proxy-btn').style.opacity = isProxy ? '1' : '0.3';
        alert(isProxy ? "Анти-блок включен. Используются резервные плееры." : "Анти-блок выключен. Используется стандартный плеер YouTube.");
    }

    function setFilter(query, element) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if(element) element.classList.add('active');
        initLoad(query);
    }

    function triggerSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (query) setFilter(query, null);
    }

    async function fetchPiped(endpoint) {
        let lastError = "";
        for (let url of API_URLS) {
            try {
                const res = await fetch(url + endpoint);
                if (res.ok) return await res.json();
            } catch (e) {
                lastError = e.message;
            }
        }
        throw new Error("Не удалось подключиться ни к одному серверу.");
    }

    async function initLoad(query) {
        const view = document.getElementById('main-view');
        view.innerHTML = '<div class="msg-box">Загрузка...</div>';
        
        try {
            let endpoint = query ? `search?q=${encodeURIComponent(query)}&filter=all` : `trending?region=RU`;
            const data = await fetchPiped(endpoint);
            
            const items = data.items || data; // Зависит от эндпоинта
            if (!items || items.length === 0) {
                view.innerHTML = '<div class="msg-box">Ничего не найдено.</div>';
                return;
            }

            let html = '';
            items.forEach(v => {
                if (v.type !== 'stream') return;
                let id = v.url.replace('/watch?v=', '');
                html += `
                    <div class="video-card" onclick="openPlayer('${id}')">
                        <div class="thumb"><img src="${v.thumbnail}"></div>
                        <div class="meta-container">
                            <div class="avatar"></div>
                            <div class="meta">
                                <div class="title">${v.title}</div>
                                <div class="channel">${v.uploaderName} • ${v.uploadedDate || 'Недавно'}</div>
                            </div>
                        </div>
                    </div>`;
            });
            view.innerHTML = html;
        } catch (error) {
            view.innerHTML = `<div class="msg-box">Ошибка: ${error.message}</div>`;
        }
    }

    function openPlayer(id) {
        currentVideoId = id;
        document.getElementById('player-modal').style.display = 'flex';
        switchPlayerType(isProxy ? 'piped' : 'youtube');
    }

    function switchPlayerType(type) {
        const target = document.getElementById('player-target');
        if (type === 'piped') {
            target.innerHTML = `<iframe src="https://piped.video/embed/${currentVideoId}?autoplay=1" allowfullscreen></iframe>`;
        } else {
            target.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${currentVideoId}?autoplay=1" allowfullscreen></iframe>`;
        }
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('player-target').innerHTML = '';
        currentVideoId = null;
    }

    document.getElementById('search-input').addEventListener('keypress', e => { if (e.key === 'Enter') triggerSearch(); });

    // Старт
    initLoad('');
</script>

</body>
</html>
