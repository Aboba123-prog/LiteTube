<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiteTube</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: "Roboto", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Красная полоса загрузки (YouTube TV Style) */
        #loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #ff0000;
            width: 0;
            z-index: 9999;
            box-shadow: 0 0 8px #ff0000;
            opacity: 0;
            transition: width 0.4s ease, opacity 0.2s ease;
        }

        /* Шапка */
        header {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: justify;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            padding: 12px 24px;
            background-color: #0f0f0f;
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -1px;
            font-family: "YouTube Sans", "Roboto Condensed", "Arial Black", sans-serif;
            color: #ffffff;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
        }
        .logo-text svg {
            margin-right: 6px;
        }

        .search-trigger-btn {
            background: none;
            border: none;
            color: #f1f1f1;
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
        }

        /* Категории (Chips) — Фикс для iPad Air 1 */
        .categories-bar {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            padding: 6px 24px 14px 24px;
            overflow-x: auto;
            background-color: #0f0f0f;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories-bar::-webkit-scrollbar { display: none; }

        .chip {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            color: #f1f1f1;
            -webkit-flex-shrink: 0;
            flex-shrink: 0; /* Спасает от слипания плашек на старых iOS */
            margin-right: 10px; /* Замена gap для старых WebKit */
        }
        .chip.active {
            background-color: #ffffff;
            color: #0f0f0f;
        }

        /* Универсальная Flex-сетка */
        main {
            padding: 0 24px 80px 24px;
            max-width: 1920px;
            margin: 0 auto;
        }

        .video-grid {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-wrap: wrap;
            flex-wrap: wrap;
            margin-left: -8px;
            margin-right: -8px;
        }

        .video-card {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -webkit-flex-direction: column;
            flex-direction: column;
            cursor: pointer;
            padding: 0 8px;
            margin-bottom: 36px;
            width: 100%;
        }

        .thumbnail-wrapper {
            width: 100%;
            position: relative;
            padding-top: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
        }

        .thumbnail {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .video-meta {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            margin-top: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #444;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            font-weight: bold;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
            font-size: 14px;
            margin-right: 12px;
        }

        .video-details {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -webkit-flex-direction: column;
            flex-direction: column;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            color: #f1f1f1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .video-author { font-size: 12px; color: #aaaaaa; }

        .ad-label {
            background-color: #f1f1f1;
            color: #0f0f0f;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 6px;
            display: inline-block;
            vertical-align: middle;
        }

        /* --- ПОЛКА SHORTS --- */
        .shorts-shelf {
            width: 100%;
            padding: 16px 8px 24px 8px;
            border-bottom: 4px solid #212121;
            margin-bottom: 20px;
        }

        .shorts-shelf-header {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .shorts-shelf-grid {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-wrap: wrap;
            flex-wrap: wrap;
            margin-left: -6px;
            margin-right: -6px;
        }

        .shorts-shelf-card {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -webkit-flex-direction: column;
            flex-direction: column;
            cursor: pointer;
            padding: 0 6px;
            width: 50%;
            margin-bottom: 16px;
        }

        .shorts-shelf-thumb-wrapper {
            width: 100%;
            position: relative;
            padding-top: 160%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #1c1c1c;
        }

        .shorts-shelf-title {
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #ffffff;
        }

        /* Исправленная иконка Shorts и треугольник */
        .shorts-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        /* Страница просмотра видео */
        .watch-container { width: 100%; max-width: 1280px; margin: 0 auto; }
        .player-wrapper {
            width: 100%; background-color: #000; border-radius: 12px;
            overflow: hidden; position: relative; padding-top: 56.25%;
        }
        .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .watch-title { font-size: 18px; font-weight: 700; margin: 16px 0 8px 0; }
        .stream-status { font-size: 12px; color: #2bda7a; margin-bottom: 16px; }
        .watch-author-row {
            display: -webkit-box; display: -webkit-flex; display: flex;
            -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;
            -webkit-flex-wrap: wrap; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid #272727;
        }
        .author-left { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; }
        .subscribe-btn { background-color: #ffffff; color: #000000; padding: 8px 16px; border-radius: 18px; font-weight: 600; border: none; font-size: 13px; margin-left: 12px; }
        .actions-right { display: -webkit-box; display: -webkit-flex; display: flex; }
        .action-pill { background-color: rgba(255, 255, 255, 0.1); padding: 8px 14px; border-radius: 18px; font-size: 13px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; margin-left: 8px; }
        .action-pill i { margin-right: 6px; }

        /* --- ЛЕНТА ВЕРТИКАЛЬНЫХ SHORTS --- */
        .shorts-feed {
            display: -webkit-box; display: -webkit-flex; display: flex;
            -webkit-box-orient: vertical; -webkit-box-direction: normal; -webkit-flex-direction: column; flex-direction: column;
            -webkit-box-align: center; -webkit-align-items: center; align-items: center; gap: 20px; max-width: 480px; margin: 0 auto;
        }

        .shorts-card {
            width: 100%; height: 75vh; background-color: #000; border-radius: 12px; position: relative; overflow: hidden;
        }

        .shorts-video { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; }

        .shorts-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: 3;
            display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; -webkit-box-align: center; -webkit-align-items: center; align-items: center; cursor: pointer;
        }
        .shorts-cover::before {
            content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
            background: -webkit-linear-gradient(top, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
        }

        .shorts-play-btn { font-size: 44px; color: #fff; z-index: 4; opacity: 0.8; }
        .shorts-overlay-info { position: absolute; bottom: 16px; left: 16px; right: 70px; z-index: 5; }
        .shorts-overlay-author { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
        .shorts-overlay-title { font-size: 13px; line-height: 1.3; color: #fff; }
        .shorts-side-actions { position: absolute; right: 12px; bottom: 24px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-box-direction: normal; -webkit-flex-direction: column; flex-direction: column; -webkit-box-align: center; -webkit-align-items: center; align-items: center; z-index: 5; }
        .shorts-action-circle { width: 40px; height: 40px; border-radius: 50%; background-color: rgba(39, 39, 39, 0.6); display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; font-size: 16px; color: #fff; margin-top: 16px; }
        .shorts-side-actions span { font-size: 11px; margin-top: 4px; color: #fff; }

        /* --- НИЖНИЙ НАВИГАЦИОННЫЙ БАР --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background-color: #0f0f0f;
            border-top: 1px solid #212121; display: -webkit-box; display: -webkit-flex; display: flex;
            -webkit-justify-content: space-around; justify-content: space-around; -webkit-box-align: center; -webkit-align-items: center; align-items: center; z-index: 1000;
        }

        .nav-item {
            display: -webkit-box; display: -webkit-flex; display: flex; 
            -webkit-box-orient: vertical; -webkit-box-direction: normal; -webkit-flex-direction: column; flex-direction: column; 
            -webkit-box-align: center; -webkit-align-items: center; align-items: center;
            -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; 
            color: #aaaaaa;
            cursor: pointer; font-size: 10px; width: 25%; height: 100%;
            user-select: none; -webkit-user-select: none;
            transition: color 0.15s ease-in-out;
        }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 4px; }
        .nav-item svg { margin-bottom: 4px; }
        
        /* Исправлено: теперь оба раздела при нажатии наполняются белым */
        .nav-item.active { color: #ffffff !important; }

        /* Стили для аккуратного окна ошибки */
        .error-container {
            text-align: center;
            padding: 80px 24px;
            color: #aaaaaa;
            max-width: 400px;
            margin: 0 auto;
        }
        .error-container i {
            font-size: 44px;
            color: #ff4444;
            margin-bottom: 16px;
        }
        .error-btn {
            background-color: #ffffff;
            color: #0f0f0f;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (min-width: 641px) and (max-width: 1024px) {
            .video-card { width: 50%; }
            .shorts-shelf-card { width: 25%; }
        }

        @media (min-width: 1025px) and (max-width: 1600px) {
            .video-card { width: 25%; }
            .shorts-shelf-card { width: 16.66%; }
        }

        @media (min-width: 1601px) {
            .video-card { width: 20%; }
            .shorts-shelf-card { width: 16.66%; }
            .video-title { font-size: 16px; }
            .logo-text { font-size: 26px; }
        }
    </style>
</head>
<body>

    <header>

    <div class="categories-bar" id="chipsBar">

            <svg class="shorts-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.748 10.488L16.033 9.47l1.836-1.077c1.977-1.157 2.628-3.69 1.454-5.64C18.257.94 15.688.298 13.71.137l-7.74 4.542c-.93.546-1.5 1.54-1.5 2.616 0 1.075.57 2.07 1.5 2.616l1.715 1.018-1.836 1.077c-1.977 1.157-2.628 3.69-1.454 5.64 1.066 1.782 3.013 2.695 4.953 2.457a4.935 4.935 0 002.39-1.117l7.74-4.542c.93-.546 1.5-1.54 1.5-2.616s-.57-2.07-1.5-2.616l-.23-.134zm-7.494 5.23V8.282l6.208 3.718-6.208 3.718z" />
            </svg>

    <script>
        var appContent = document.getElementById('app-content');
        var chipsBar = document.getElementById('chipsBar');
        var loadingBar = document.getElementById('loading-bar');

        var INSTANCES = [
            "https://invidious.perennialte.ch",
            "https://iv.melmac.space",
            "https://invidious.flokinet.to",
            "https://yewtu.be",
            "https://invidious.lunar.icu"
        ];
        
        // Большой массив предпочтений для заполнения ТВ, ноутбуков и iPad Air
        var PREFERENCES = [
            { name: "Все", query: "Популярное" },
            { name: "Музыка", query: "Музыка тренды" },
            { name: "Гаджеты", query: "Гаджеты технологии обзор" },
            { name: "Наука", query: "Научпоп космос" },
            { name: "Фильмы", query: "Кино трейлеры" },
            { name: "Игры", query: "Игровые новинки стрим" },
            { name: "Спорт", query: "Спорт футбольные обзоры" },
            { name: "Авто", query: "Авто обзоры тест драйв" },
            { name: "Юмор", query: "Стендап приколы шоу" },
            { name: "Подкасты", query: "Интервью подкасты" },
            { name: "Кулинария", query: "Рецепты вкусная еда" },
            { name: "Путешествия", query: "Орел и решка тревел блоги" },
            { name: "Лайфхаки", query: "Своими руками diy" },
            { name: "Аниме", query: "Аниме клипы трейлеры" },
            { name: "ASMR", query: "asmr расслабление" },
            { name: "Тренды", query: "Тренды ютуба" }
        ];

        var currentServerIdx = 0;
        var cachedVideos = [];
        var currentTab = 'home';
        var isShortsLoading = false;
        var lastSearchQuery = "Популярное";

        function getActiveServer() { return INSTANCES[currentServerIdx]; }
        function switchServer() { currentServerIdx = (currentServerIdx + 1) % INSTANCES.length; }

        // Управление полосой загрузки (YouTube TV style)
        function startLoadingAnimation() {
            loadingBar.style.opacity = "1";
            loadingBar.style.width = "30%";
            setTimeout(function() { if(loadingBar.style.width === "30%") loadingBar.style.width = "75%"; }, 300);
        }

        function endLoadingAnimation() {
            loadingBar.style.width = "100%";
            setTimeout(function() {
                loadingBar.style.opacity = "0";
                setTimeout(function() { loadingBar.style.width = "0"; }, 200);
            }, 200);
        }

        // Рендер категорий
        function renderChips() {
            var html = "";
            for (var i = 0; i < PREFERENCES.length; i++) {
                var cls = (i === 0) ? "chip active" : "chip";
                html += '<div class="' + cls + '" onclick="clickChip(this, \'' + PREFERENCES[i].query + '\')">' + PREFERENCES[i].name + '</div>';
            }
            chipsBar.innerHTML = html;
        }

        function openSearchPrompt() {
            var text = prompt("Что хотите найти на LiteTube?");
            if (text && text.trim() !== "") {
                if (currentTab === 'shorts') switchToTab('home');
                var chips = document.getElementsByClassName('chip');
                for (var i = 0; i < chips.length; i++) {
                    chips[i].classList.remove('active');
                }
                loadVideos(text.trim());
            }
        }

        function switchToTab(tab) {
            currentTab = tab;
            var navItems = document.getElementsByClassName('nav-item');
            for (var i = 0; i < navItems.length; i++) {
                navItems[i].classList.remove('active');
            }

            if (tab === 'home') {
                document.getElementById('nav-home').classList.add('active');
                chipsBar.style.display = "flex";
                if (cachedVideos.length > 0) {
                    renderFeed(cachedVideos);
                } else {
                    resetToHome();
                }
            } else if (tab === 'shorts') {
                document.getElementById('nav-shorts').classList.add('active');
                chipsBar.style.display = "none";
                appContent.innerHTML = '<div class="shorts-feed" id="shortsFeedBox"></div>';
                loadShortsPack();
            }
        }

        function loadVideos(query) {
            lastSearchQuery = query;
            startLoadingAnimation();
            var attempt = 0;

            function executeAjax() {
                var xhr = new XMLHttpRequest();
                var url = getActiveServer() + '/api/v1/search?q=' + encodeURIComponent(query) + '&type=video';
                xhr.open('GET', url, true);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try {
                                var data = JSON.parse(xhr.responseText);
                                cachedVideos = data;
                                renderFeed(data);
                                endLoadingAnimation();
                            } catch (e) {
                                retry();
                            }
                        } else {
                            retry();
                        }
                    }
                };
                xhr.send();
            }

            function retry() {
                attempt++;
                if (attempt < INSTANCES.length) {
                    switchServer();
                    executeAjax();
                } else {
                    endLoadingAnimation();
                    showErrorOverlay("loadVideos('" + query + "')");
                }
            }

            executeAjax();
        }

        function showErrorOverlay(retryFnCall) {
            appContent.innerHTML = '<div class="error-container">' +
                '<i class="fa-solid fa-circle-exclamation"></i>' +
                '<h3>Ошибка соединения</h3>' +
                '<p style="font-size:13px; margin-top:6px; color:#888;">Серверы перегружены или недоступны.</p>' +
                '<button class="error-btn" onclick="' + retryFnCall + '"><i class="fa-solid fa-arrow-rotate-right"></i> Попробовать снова</button>' +
            '</div>';
        }

        function generateRandomAdHTML() {
            return '<div class="video-card" onclick="alert(\'LiteTube Креатор активирован!\')">' +
                '<div class="thumbnail-wrapper">' +
                    '<div style="position:absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #1f1111 0%, #080808 100%); display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center; -webkit-box-orient:vertical; -webkit-box-direction:normal; -webkit-flex-direction:column; flex-direction:column; gap:8px;">' +
                        '<i class="fa-solid fa-bolt" style="font-size:32px; color:#ff0000;"></i>' +
                        '<span style="font-weight:700; font-size:15px; color:#ffffff; letter-spacing:0.5px;">LITETUBE SHORTS PREM</span>' +
                    '</div>' +
                '</div>' +
                '<div class="video-meta">' +
                    '<div class="channel-avatar" style="background-color:#ff0000; color:#fff;"><i class="fa-solid fa-star"></i></div>' +
                    '<div class="video-details">' +
                        '<div class="video-title"><span class="ad-label">Реклама</span>Смотри бесконечную ленту Shorts без задержек и лагов.</div>' +
                        '<div class="video-author">LiteTube Media</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }

        function renderFeed(items) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "flex";
            
            if (!items || items.length === 0) {
                appContent.innerHTML = '<div style="text-align:center; padding:60px; color:#aaa;">Ничего не найдено 😔</div>';
                return;
            }

            var screenWidth = window.innerWidth || document.documentElement.clientWidth;
            var html = '<div class="video-grid">';

            html += generateRandomAdHTML();
            var rawShortsPool = items.slice(0, 4);

            if (screenWidth <= 640) {
                html += generateShortsShelfHTML(rawShortsPool);
                for (var i = 0; i < items.length; i++) {
                    html += generateVideoCardHTML(items[i]);
                }
            } else {
                var splitIndex = screenWidth > 1600 ? 5 : 4; 
                for (var i = 0; i < items.length; i++) {
                    html += generateVideoCardHTML(items[i]);
                    if (i === (splitIndex - 1)) {
                        html += generateShortsShelfHTML(rawShortsPool);
                    }
                }
            }

            html += '</div>';
            appContent.innerHTML = html;
        }

        function generateVideoCardHTML(video) {
            if (!video.videoId) return '';
            var firstLetter = video.author ? video.author.charAt(0).toUpperCase() : 'L';
            var safeTitle = video.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
            var safeChannel = video.author.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
            var thumbUrl = (video.videoThumbnails && video.videoThumbnails.length > 0) ? video.videoThumbnails[0].url : 'https://img.youtube.com/vi/' + video.videoId + '/hqdefault.jpg';
            var colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#009688', '#4caf50'];
            var avatarBg = colors[Math.floor(Math.random() * colors.length)];

            return '<div class="video-card" onclick="openWatchPage(\'' + video.videoId + '\', \'' + safeTitle + '\', \'' + safeChannel + '\', \'' + firstLetter + '\', \'' + avatarBg + '\')">' +
                '<div class="thumbnail-wrapper"><img class="thumbnail" src="' + thumbUrl + '" alt="preview"></div>' +
                '<div class="video-meta">' +
                    '<div class="channel-avatar" style="background-color: ' + avatarBg + '">' + firstLetter + '</div>' +
                    '<div class="video-details">' +
                        '<div class="video-title">' + video.title + '</div>' +
                        '<div class="video-author">' + video.author + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }

        function generateShortsShelfHTML(shortsItems) {
            var shelfHtml = '<div class="shorts-shelf">' +
                '<div class="shorts-shelf-header">' +
                    '<svg class="shorts-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="color: #FF0000;">' +
                        '<path d="M17.748 10.488L16.033 9.47l1.836-1.077c1.977-1.157 2.628-3.69 1.454-5.64C18.257.94 15.688.298 13.71.137l-7.74 4.542c-.93.546-1.5 1.54-1.5 2.616 0 1.075.57 2.07 1.5 2.616l1.715 1.018-1.836 1.077c-1.977 1.157-2.628 3.69-1.454 5.64 1.066 1.782 3.013 2.695 4.953 2.457a4.935 4.935 0 002.39-1.117l7.74-4.542c.93-.546 1.5-1.54 1.5-2.616s-.57-2.07-1.5-2.616l-.23-.134zm-7.494 5.23V8.282l6.208 3.718-6.208 3.718z" />' +
                    '</svg>' +
                    '<span>Shorts</span>' +
                '</div>' +
                '<div class="shorts-shelf-grid">';

            for (var i = 0; i < shortsItems.length; i++) {
                var item = shortsItems[i];
                var imgUrl = 'https://img.youtube.com/vi/' + item.videoId + '/hqdefault.jpg';
                var safeTitle = item.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                shelfHtml += '<div class="shorts-shelf-card" onclick="activateShortsFromShelf(\'' + item.videoId + '\')">' +
                    '<div class="shorts-shelf-thumb-wrapper" style="background-image: url(\'' + imgUrl + '\'); background-size: cover; background-position: center;"></div>' +
                    '<div class="shorts-shelf-title">' + safeTitle + '</div>' +
                '</div>';
            }

            shelfHtml += '</div></div>';
            return shelfHtml;
        }

        function activateShortsFromShelf(id) {
            switchToTab('shorts');
            setTimeout(function() {
                activateShortVideo(id);
                var target = document.getElementById('short-' + id);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        }

        function loadShortsPack() {
            if (isShortsLoading) return;
            isShortsLoading = true;
            startLoadingAnimation();

            var xhr = new XMLHttpRequest();
            var url = getActiveServer() + '/api/v1/search?q=' + encodeURIComponent('shorts тренды кубы') + '&type=video';
            xhr.open('GET', url, true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    endLoadingAnimation();
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            appendShortsToDOM(data);
                        } catch (e) {}
                    } else {
                        showErrorOverlay("loadShortsPack()");
                    }
                    isShortsLoading = false;
                }
            };
            xhr.send();
        }

        function appendShortsToDOM(items) {
            var shortsFeedBox = document.getElementById('shortsFeedBox');
            if (!shortsFeedBox) return;

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (!item.videoId || document.getElementById('short-' + item.videoId)) continue;

                var safeTitle = item.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                var safeAuthor = item.author.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                var thumbUrl = 'https://img.youtube.com/vi/' + item.videoId + '/hqdefault.jpg';

                var card = document.createElement('div');
                card.className = 'shorts-card';
                card.id = 'short-' + item.videoId;
                card.innerHTML = '<div class="shorts-cover" id="cover-' + item.videoId + '" style="background-image: url(\'' + thumbUrl + '\')" onclick="activateShortVideo(\'' + item.videoId + '\')">' +
                        '<i class="fa-solid fa-play shorts-play-btn"></i>' +
                    '</div>' +
                    '<div style="width:100%; height:100%;" id="player-slot-' + item.videoId + '"></div>' +
                    '<div class="shorts-overlay-info">' +
                        '<div class="shorts-overlay-author"><i class="fa-solid fa-circle-user"></i> ' + safeAuthor + '</div>' +
                        '<div class="shorts-overlay-title">' + safeTitle + '</div>' +
                    '</div>' +
                    '<div class="shorts-side-actions">' +
                        '<div class="shorts-action-circle"><i class="fa-solid fa-thumbs-up"></i></div><span>Like</span>' +
                        '<div class="shorts-action-circle"><i class="fa-solid fa-comment"></i></div><span>Reply</span>' +
                        '<div class="shorts-action-circle" onclick="alert(\'Ссылка скопирована!\');"><i class="fa-solid fa-share"></i></div><span>Share</span>' +
                    '</div>';
                shortsFeedBox.appendChild(card);
            }
        }

        function activateShortVideo(id) {
            var videos = document.getElementsByClassName('shorts-video');
            for (var i = 0; i < videos.length; i++) {
                var oldId = videos[i].parentNode.id.replace('player-slot-', '');
                videos[i].remove();
                var cover = document.getElementById('cover-' + oldId);
                if (cover) cover.style.display = 'flex';
            }

            var targetCover = document.getElementById('cover-' + id);
            if (targetCover) targetCover.style.display = 'none';

            var slot = document.getElementById('player-slot-' + id);
            if (slot) {
                startLoadingAnimation();
                
                var xhr = new XMLHttpRequest();
                xhr.open('GET', getActiveServer() + '/api/v1/videos/' + id, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        endLoadingAnimation();
                        if (xhr.status === 200) {
                            try {
                                var data = JSON.parse(xhr.responseText);
                                if (data.formatStreams && data.formatStreams.length > 0) {
                                    var streamUrl = data.formatStreams[0].url;
                                    slot.innerHTML = '<video class="shorts-video" id="video-control-' + id + '" controls autoplay loop playsinline src="' + streamUrl + '"></video>';
                                } else {
                                    showErrorOverlay("activateShortVideo('" + id + "')");
                                }
                            } catch(e) {
                                showErrorOverlay("activateShortVideo('" + id + "')");
                            }
                        } else {
                            showErrorOverlay("activateShortVideo('" + id + "')");
                        }
                    }
                };
                xhr.send();
            }
        }

        window.onscroll = function() {
            if (currentTab === 'shorts') {
                if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 900) {
                    loadShortsPack();
                }
            }
        };

        function openWatchPage(id, title, channel, letter, avatarColor) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "none";
            startLoadingAnimation();

            appContent.innerHTML = '<div class="watch-container">' +
                    '<div class="player-wrapper" id="mainPlayerSlot"></div>' +
                    '<h1 class="watch-title">' + title + '</h1>' +
                    '<div class="stream-status" id="statusLabel"><i class="fa-solid fa-server"></i> Стабилизация...</div>' +
                    '<div class="watch-author-row">' +
                        '<div class="author-left">' +
                            '<div class="channel-avatar" style="background-color: ' + avatarColor + '">' + letter + '</div>' +
                            '<div><span style="font-weight:600; font-size:15px;">' + channel + '</span></div>' +
                            '<button class="subscribe-btn" onclick="this.innerText=\'Вы подписаны\';">Подписаться</button>' +
                        '</div>' +
                        '<div class="actions-right">' +
                            '<div class="action-pill"><i class="fa-regular fa-thumbs-up"></i> Лайк</div>' +
                            '<div class="action-pill" onclick="switchToTab(\'home\')"><i class="fa-solid fa-arrow-left"></i> Выход</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';

            var xhr = new XMLHttpRequest();
            xhr.open('GET', getActiveServer() + '/api/v1/videos/' + id, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    endLoadingAnimation();
                    var slot = document.getElementById('mainPlayerSlot');
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            var streamUrl = "";
                            if (data.formatStreams && data.formatStreams.length > 0) {
                                for (var i=0; i<data.formatStreams.length; i++) {
                                    if (data.formatStreams[i].quality === "hd720" || data.formatStreams[i].quality === "medium") {
                                        streamUrl = data.formatStreams[i].url;
                                        break;
                                    }
                                }
                                if(!streamUrl) streamUrl = data.formatStreams[0].url;
                            }
                            
                            if (streamUrl) {
                                slot.innerHTML = '<video id="html5Player" controls autoplay playsinline src="' + streamUrl + '"></video>';
                                document.getElementById('statusLabel').innerHTML = '<i class="fa-solid fa-circle-check"></i> Поток подключен';
                            } else {
                                showErrorOverlay("openWatchPage('" + id + "','" + title + "','" + channel + "','" + letter + "','" + avatarColor + "')");
                            }
                        } catch(e) {
                            showErrorOverlay("openWatchPage('" + id + "','" + title + "','" + channel + "','" + letter + "','" + avatarColor + "')");
                        }
                    } else {
                        showErrorOverlay("openWatchPage('" + id + "','" + title + "','" + channel + "','" + letter + "','" + avatarColor + "')");
                    }
                }
            };
            xhr.send();
        }

        function clickChip(element, searchQuery) {
            var chips = document.getElementsByClassName('chip');
            for (var i = 0; i < chips.length; i++) {
                chips[i].classList.remove('active');
            }
            element.classList.add('active');
            loadVideos(searchQuery);
        }

        function resetToHome() {
            renderChips();
            loadVideos('Популярное');
        }

        resetToHome();
    </script>
</body>
</html>
