            var thumbUrl = (video.videoThumbnails && video.videoThumbnails.length > 0) ? video.videoThumbnails[0].url : 'https://img.youtube.com/vi/' + video.videoId + '/hqdefault.jpg';
            var colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#009688', '#4caf50'];
            var avatarBg = colors[Math.floor(Math.random() * colors.length)];

            return '<div class="video-card" onclick="openWatchPage(\'' + video.videoId + '\', \'' + safeTitle + '\', \'' + safeChannel + '\', \'' + firstLetter + '\', \'' + avatarBg + '\')">' +
                '<div class="thumbnail-wrapper"><img class="thumbnail" src="' + thumbUrl + '" alt="preview"></div>' +
                '<div class="video-meta">' +
                    '<div class="channel-avatar" style="background-color: ' + avatarBg + '">' + firstLetter + '</div>' +
                    '<div class="video-details">' +
                        '<div class="video-title">' + video.title + '</div>' +
                        '<div class="video-author">' + video.author + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }

        function generateShortsShelfHTML(shortsItems) {
            var shelfHtml = '<div class="shorts-shelf">' +
                '<div class="shorts-shelf-header">' +
                    '<svg class="shorts-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="color: #FF0000; margin-right: 4px;">' +
                        '<path d="M17.748 10.488L16.033 9.47l1.836-1.077c1.977-1.157 2.628-3.69 1.454-5.64C18.257.94 15.688.298 13.71.137l-7.74 4.542c-.93.546-1.5 1.54-1.5 2.616 0 1.075.57 2.07 1.5 2.616l1.715 1.018-1.836 1.077c-1.977 1.157-2.628 3.69-1.454 5.64 1.066 1.782 3.013 2.695 4.953 2.457a4.935 4.935 0 002.39-1.117l7.74-4.542c.93-.546 1.5-1.54 1.5-2.616s-.57-2.07-1.5-2.616l-.23-.134zm-7.494 5.23V8.282l6.208 3.718-6.208 3.718z" />' +
                    '</svg>' +
                    '<span>Shorts</span>' +
                '</div>' +
                '<div class="shorts-shelf-grid">';

            for (var i = 0; i < shortsItems.length; i++) {
                var item = shortsItems[i];
                var imgUrl = 'https://img.youtube.com/vi/' + item.videoId + '/hqdefault.jpg';
                var safeTitle = item.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                shelfHtml += '<div class="shorts-shelf-card" onclick="activateShortsFromShelf(\'' + item.videoId + '\')">' +
                    '<div class="shorts-shelf-thumb-wrapper" style="background-image: url(\'' + imgUrl + '\'); background-size: cover; background-position: center;"></div>' +
                    '<div class="shorts-shelf-title">' + safeTitle + '</div>' +
                '</div>';
            }

            shelfHtml += '</div></div>';
            return shelfHtml;
        }

        function activateShortsFromShelf(id) {
            switchToTab('shorts');
            setTimeout(function() {
                activateShortVideo(id);
                var target = document.getElementById('short-' + id);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        }

        function loadShortsPack() {
            if (isShortsLoading) return;
            isShortsLoading = true;

            var shortsFeedBox = document.getElementById('shortsFeedBox');
            if (shortsFeedBox && shortsFeedBox.children.length === 0) {
                shortsFeedBox.innerHTML = '<div class="loader" id="shortsInitLoader"><i class="fa-solid fa-circle-notch fa-spin"></i> Загрузка Shorts...</div>';
            }

            var xhr = new XMLHttpRequest();
            var url = getActiveServer() + '/api/v1/search?q=' + encodeURIComponent('shorts тренды кубы') + '&type=video';
            xhr.open('GET', url, true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var initLoader = document.getElementById('shortsInitLoader');
                    if (initLoader) initLoader.remove();
                    try {
                        var data = JSON.parse(xhr.responseText);
                        appendShortsToDOM(data);
                    } catch (e) {}
                }
                isShortsLoading = false;
            };
            xhr.send();
        }

        function appendShortsToDOM(items) {
            var shortsFeedBox = document.getElementById('shortsFeedBox');
            if (!shortsFeedBox) return;

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (!item.videoId || document.getElementById('short-' + item.videoId)) continue;

                var safeTitle = item.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                var safeAuthor = item.author.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                var thumbUrl = 'https://img.youtube.com/vi/' + item.videoId + '/hqdefault.jpg';

                var card = document.createElement('div');
                card.className = 'shorts-card';
                card.id = 'short-' + item.videoId;
                card.innerHTML = '<div class="shorts-cover" id="cover-' + item.videoId + '" style="background-image: url(\'' + thumbUrl + '\')" onclick="activateShortVideo(\'' + item.videoId + '\')">' +
                        '<i class="fa-solid fa-play shorts-play-btn"></i>' +
                    '</div>' +
                    '<div style="width:100%; height:100%;" id="player-slot-' + item.videoId + '"></div>' +
                    '<div class="shorts-overlay-info">' +
                        '<div class="shorts-overlay-author"><i class="fa-solid fa-circle-user"></i> ' + safeAuthor + '</div>' +
                        '<div class="shorts-overlay-title">' + safeTitle + '</div>' +
                    '</div>' +
                    '<div class="shorts-side-actions">' +
                        '<div class="shorts-action-circle"><i class="fa-solid fa-thumbs-up"></i></div><span>Like</span>' +
                        '<div class="shorts-action-circle"><i class="fa-solid fa-comment"></i></div><span>Reply</span>' +
                        '<div class="shorts-action-circle" onclick="alert(\'Ссылка скопирована!\');"><i class="fa-solid fa-share"></i></div><span>Share</span>' +
                    '</div>';
                shortsFeedBox.appendChild(card);
            }
        }

        function activateShortVideo(id) {
            var videos = document.getElementsByClassName('shorts-video');
            for (var i = 0; i < videos.length; i++) {
                var oldId = videos[i].parentNode.id.replace('player-slot-', '');
                videos[i].remove();
                var cover = document.getElementById('cover-' + oldId);
                if (cover) cover.style.display = 'flex';
            }

            var targetCover = document.getElementById('cover-' + id);
            if (targetCover) targetCover.style.display = 'none';

            var slot = document.getElementById('player-slot-' + id);
            if (slot) {
                var streamUrl = getActiveServer() + '/latest_version?id=' + id + '&itag=22&local=true';
                slot.innerHTML = '<video class="shorts-video" id="video-control-' + id + '" controls autoplay loop playsinline src="' + streamUrl + '"></video>';
            }
        }

        window.onscroll = function() {
            if (currentTab === 'shorts') {
                if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 900) {
                    loadShortsPack();
                }
            }
        };

        function openWatchPage(id, title, channel, letter, avatarColor) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "none";

            appContent.innerHTML = '<div class="watch-container">' +
                    '<div class="player-wrapper"><video id="html5Player" controls autoplay playsinline></video></div>' +
                    '<h1 class="watch-title">' + title + '</h1>' +
                    '<div class="stream-status" id="statusLabel"><i class="fa-solid fa-server"></i> Стабилизация...</div>' +
                    '<div class="watch-author-row">' +
                        '<div class="author-left">' +
                            '<div class="channel-avatar" style="background-color: ' + avatarColor + '">' + letter + '</div>' +
                            '<div><span style="font-weight:600; font-size:15px;">' + channel + '</span></div>' +
                            '<button class="subscribe-btn" onclick="this.innerText=\'Вы подписаны\';">Подписаться</button>' +
                        '</div>' +
                        '<div class="actions-right">' +
                            '<div class="action-pill"><i class="fa-regular fa-thumbs-up"></i> Лайк</div>' +
                            '<div class="action-pill" onclick="switchToTab(\'home\')"><i class="fa-solid fa-arrow-left"></i> Выход</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';

            var player = document.getElementById('html5Player');
            player.src = getActiveServer() + '/latest_version?id=' + id + '&itag=22&local=true';
            player.load();
        }

        function clickChip(element, searchQuery) {
            var chips = document.getElementsByClassName('chip');
            for (var i = 0; i < chips.length; i++) {
                chips[i].classList.remove('active');
            }
            element.classList.add('active');
            loadVideos(searchQuery);
        }

        function resetToHome() {
            var firstChip = document.querySelector('.chip');
            if (firstChip) clickChip(firstChip, 'Популярное россии');
        }

        resetToHome();
    </script>
</body>
</html>
