<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Premium Lite</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-card: #0f0f0f;
            --bg-pill: #272727;
            --bg-pill-hover: #3f3f3f;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --yt-red: #ff0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "Roboto", "YouTube Sans", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* Обновленная аккуратная шапка */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background-color: var(--bg-main);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .logo-icon {
            width: 28px;
            height: 20px;
            background-color: var(--yt-red);
            border-radius: 5px;
            position: relative;
        }

        .logo-icon::after {
            content: "";
            position: absolute;
            border-style: solid;
            border-width: 4px 0 4px 7px;
            border-color: transparent transparent transparent #ffffff;
            top: 6px;
            left: 11px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-family: "YouTube Sans", sans-serif;
        }

        /* Кнопка-лупа вместо огромного инпута */
        .search-trigger-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            user-select: none;
        }
        .search-trigger-btn:active {
            opacity: 0.6;
        }

        /* Быстрые категории (Chips) */
        .categories-bar {
            display: flex;
            gap: 10px;
            padding: 5px 20px 15px 20px;
            overflow-x: auto;
            background-color: var(--bg-main);
        }
        .categories-bar::-webkit-scrollbar { display: none; }

        .chip {
            background-color: var(--bg-pill);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .chip.active {
            background-color: var(--text-main);
            color: var(--bg-main);
        }

        /* Лента видео */
        main {
            padding: 10px 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            column-gap: 16px;
            row-gap: 35px;
        }

        .video-card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .thumbnail-wrapper {
            width: 100%;
            position: relative;
            padding-top: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
        }

        .thumbnail {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
        }

        .video-card:active .thumbnail {
            transform: scale(0.98);
        }

        .video-meta {
            display: flex;
            margin-top: 12px;
            gap: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 14px;
        }

        .video-details {
            display: flex;
            flex-direction: column;
        }

        .video-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .video-author {
            font-size: 13px;
            color: var(--text-sub);
        }

        /* Плеер */
        .watch-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .player-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            padding-top: 56.25%;
        }

        .player-wrapper video, .player-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .watch-title {
            font-size: 18px;
            font-weight: 700;
            margin: 14px 0 12px 0;
            line-height: 1.4;
        }

        .watch-author-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid #272727;
        }

        .author-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author-name-container {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            font-size: 15px;
        }

        .subs-count {
            font-size: 12px;
            color: var(--text-sub);
        }

        .subscribe-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            margin-left: 6px;
        }

        .actions-right {
            display: flex;
            gap: 8px;
        }

        .action-pill {
            background-color: var(--bg-pill);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .action-pill:active { background-color: var(--bg-pill-hover); }

        .loader {
            text-align: center;
            padding: 50px;
            color: var(--text-sub);
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="resetToHome()">
            <div class="logo-icon"></div>
            <div class="logo-text">LiteTube</div>
        </div>
        <button class="search-trigger-btn" onclick="openSearchPrompt()">🔍</button>
    </header>

    <div class="categories-bar" id="chipsBar">
        <div class="chip active" onclick="clickChip(this, 'Популярное')">Все</div>
        <div class="chip" onclick="clickChip(this, 'Новинки технологий 2026')">Технологии</div>
        <div class="chip" onclick="clickChip(this, 'Лоуфай музыка для кодинга')">Музыка</div>
        <div class="chip" onclick="clickChip(this, 'Наука и космос')">Наука</div>
        <div class="chip" onclick="clickChip(this, 'ASMR relax')">Релакс</div>
    </div>

    <main id="app-content">
        </main>

    <script>
        const appContent = document.getElementById('app-content');
        const chipsBar = document.getElementById('chipsBar');

        // Высокоскоростной прокси-сервер YouTube
        const API_BASE = "https://pipedapi.privacydev.net";
        
        let cachedVideos = [];

        // Всплывающее окно поиска при нажатии на лупу
        function openSearchPrompt() {
            const text = prompt("Что хотите найти на YouTube?");
            if (text && text.trim() !== "") {
                // Снимаем активность со всех категорий, так как пошел кастомный запрос
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                loadVideos(text.trim());
            }
        }

        // Загрузка списка видео
        async function loadVideos(query) {
            appContent.innerHTML = '<div class="loader">Получение видеопотоков... ⚡</div>';
            try {
                const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&filter=videos`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                cachedVideos = data.items;
                renderFeed(data.items);
            } catch (e) {
                appContent.innerHTML = '<div class="loader">❌ Ошибка загрузки. Попробуйте еще раз или смените запрос.</div>';
            }
        }

        // Рендеринг главной ленты
        function renderFeed(items) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "flex";
            
            if(!items || items.length === 0) {
                appContent.innerHTML = '<div class="loader">Ничего не найдено 😔</div>';
                return;
            }

            let html = '<div class="video-grid">';
            items.forEach(video => {
                const videoId = video.url.split('?v=')[1];
                if (!videoId) return;

                const firstLetter = video.uploaderName ? video.uploaderName.charAt(0).toUpperCase() : 'Y';
                const safeTitle = video.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                const safeChannel = video.uploaderName.replace(/'/g, "&#39;").replace(/"/g, "&quot;");

                const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#009688', '#4caf50'];
                const avatarBg = colors[Math.floor(Math.random() * colors.length)];

                html += `
                    <div class="video-card" onclick="openWatchPage('${videoId}', '${safeTitle}', '${safeChannel}', '${firstLetter}', '${avatarBg}')">
                        <div class="thumbnail-wrapper">
                            <img class="thumbnail" src="${video.thumbnail}" alt="preview" loading="lazy">
                        </div>
                        <div class="video-meta">
                            <div class="channel-avatar" style="background-color: ${avatarBg}">${firstLetter}</div>
                            <div class="video-details">
                                <div class="video-title">${video.title}</div>
                                <div class="video-author">${video.uploaderName}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            appContent.innerHTML = html;
        }

        // Страница воспроизведения
        async function openWatchPage(id, title, channel, letter, avatarColor) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "none";

            appContent.innerHTML = `
                <div class="watch-container">
                    <div class="player-wrapper" id="playerBox">
                        <div class="loader" style="position: absolute; top: 35%; width: 100%;">Декодирование стрима... 🚀</div>
                    </div>
                    <h1 class="watch-title">${title}</h1>
                    
                    <div class="watch-author-row">
                        <div class="author-left">
                            <div class="channel-avatar" style="background-color: ${avatarColor}">${letter}</div>
                            <div class="author-name-container">
                                <span class="author-name">${channel}</span>
                                <span class="subs-count">1.5 млн подписчиков</span>
                            </div>
                            <button class="subscribe-btn" onclick="this.innerText='Вы подписаны'; this.style.background='#272727'; this.style.color='#fff';">Подписаться</button>
                        </div>
                        
                        <div class="actions-right">
                            <div class="action-pill">👍 12K</div>
                            <div class="action-pill">↪️ Поделиться</div>
                            <div class="action-pill" onclick="goBackToFeed()" style="background-color: var(--text-main); color: var(--bg-main);">← Назад</div>
                        </div>
                    </div>
                </div>
            `;

            try {
                const res = await fetch(`${API_BASE}/streams/${id}`);
                if (!res.ok) throw new Error();
                const streamData = await res.json();

                let streamUrl = "";
                if (streamData.hls) {
                    streamUrl = streamData.hls;
                } else if (streamData.videoStreams) {
                    const validStream = streamData.videoStreams.find(s => !s.videoOnly && s.mimeType.includes('mp4'));
                    if (validStream) streamUrl = validStream.url;
                }

                if (!streamUrl) throw new Error();

                document.getElementById('playerBox').innerHTML = `
                    <video controls autoplay playsinline>
                        <source src="${streamUrl}" type="application/x-mpegURL">
                        <source src="${streamUrl}" type="video/mp4">
                    </video>
                `;
            } catch (e) {
                document.getElementById('playerBox').innerHTML = `
                    <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" 
                            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen></iframe>
                `;
            }
        }

        // Логика категорий и возврата
        刻
        function clickChip(element, searchQuery) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            loadVideos(searchQuery);
        }

        function goBackToFeed() {
            if(cachedVideos.length > 0) {
                renderFeed(cachedVideos);
            } else {
                resetToHome();
            }
        }

        function resetToHome() {
            const firstChip = document.querySelector('.chip');
            clickChip(firstChip, 'Популярное');
        }

        // Первичный пуск
        resetToHome();
    </script>
</body>
</html>
