<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Premium Lite Absolute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-card: #0f0f0f;
            --bg-pill: #272727;
            --bg-pill-hover: #3f3f3f;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --yt-red: #ff0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "Roboto", "YouTube Sans", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background-color: var(--bg-main);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .logo-icon {
            width: 32px;
            height: 22px;
            background-color: var(--yt-red);
            border-radius: 6px;
            position: relative;
        }

        .logo-icon::after {
            content: "";
            position: absolute;
            border-style: solid;
            border-width: 5px 0 5px 8px;
            border-color: transparent transparent transparent #ffffff;
            top: 6px;
            left: 13px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.7px;
            font-family: "YouTube Sans", sans-serif;
        }

        .search-trigger-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .search-trigger-btn:hover { background-color: var(--bg-pill); }
        .search-trigger-btn:active { opacity: 0.6; }

        /* Категории */
        .categories-bar {
            display: flex;
            gap: 12px;
            padding: 10px 30px 20px 30px;
            overflow-x: auto;
            background-color: var(--bg-main);
        }
        .categories-bar::-webkit-scrollbar { display: none; }

        .chip {
            background-color: var(--bg-pill);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        .chip:hover { background-color: var(--bg-pill-hover); }
        .chip.active {
            background-color: var(--text-main);
            color: var(--bg-main);
        }

        /* Главный контейнер сетки */
        main {
            padding: 10px 30px;
            max-width: 1920px;
            margin: 0 auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            column-gap: 20px;
            row-gap: 45px;
        }

        .video-card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .thumbnail-wrapper {
            width: 100%;
            position: relative;
            padding-top: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
        }

        .thumbnail {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
        }

        .video-card:hover .thumbnail { transform: scale(1.02); }
        .video-card:active .thumbnail { transform: scale(0.98); }

        .video-meta {
            display: flex;
            margin-top: 14px;
            gap: 14px;
        }

        .channel-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 15px;
        }

        .video-details { display: flex; flex-direction: column; }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .video-author { font-size: 14px; color: var(--text-sub); }

        /* Кинематографичный HTML5 Плеер */
        .watch-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 0;
        }

        .player-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            padding-top: 56.25%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* Нативный видео тег без iframe */
        .player-wrapper video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            outline: none;
        }

        .watch-title {
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0 8px 0;
            line-height: 1.4;
        }

        /* Статус-бар стриминга для прозрачности работы ИИ */
        .stream-status {
            font-size: 13px;
            color: #2bda7a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .watch-author-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            padding-bottom: 24px;
            border-bottom: 1px solid #272727;
        }

        .author-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .author-name-container { display: flex; flex-direction: column; }
        .author-name { font-weight: 600; font-size: 16px; }
        .subs-count { font-size: 13px; color: var(--text-sub); }

        .subscribe-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            margin-left: 10px;
        }

        .actions-right { display: flex; gap: 10px; }

        .action-pill {
            background-color: var(--bg-pill);
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        .action-pill:hover { background-color: var(--bg-pill-hover); }

        .loader {
            text-align: center;
            padding: 80px;
            color: var(--text-sub);
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="resetToHome()">
            <div class="logo-icon"></div>
            <div class="logo-text">LiteTube</div>
        </div>
        <button class="search-trigger-btn" onclick="openSearchPrompt()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </header>

    <div class="categories-bar" id="chipsBar">
        <div class="chip active" onclick="clickChip(this, 'Популярное россии')">Все</div>
        <div class="chip" onclick="clickChip(this, 'Свежие технологии 2026')">Технологии</div>
        <div class="chip" onclick="clickChip(this, 'Лоуфай музыка для учебы')">Музыка</div>
        <div class="chip" onclick="clickChip(this, 'Космос Наука')">Наука</div>
        <div class="chip" onclick="clickChip(this, 'Популярные трейлеры кино')">Трейлеры</div>
    </div>

    <main id="app-content">
        </main>

    <script>
        const appContent = document.getElementById('app-content');
        const chipsBar = document.getElementById('chipsBar');

        // Глобальный отказоустойчивый пул прокси-серверов Invidious
        const INSTANCES = [
            "https://invidious.perennialte.ch",
            "https://iv.melmac.space",
            "https://invidious.flokinet.to",
            "https://yewtu.be",
            "https://invidious.lunar.icu"
        ];
        
        let currentServerIdx = 0;
        let cachedVideos = [];
        let networkAttempts = 0;

        function getActiveServer() {
            return INSTANCES[currentServerIdx];
        }

        function switchServer() {
            currentServerIdx = (currentServerIdx + 1) % INSTANCES.length;
            console.log("Смена узла на: " + getActiveServer());
        }

        function openSearchPrompt() {
            const text = prompt("Что хотите найти на YouTube?");
            if (text && text.trim() !== "") {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                loadVideos(text.trim());
            }
        }

        // Отказоустойчивый поиск по пулу серверов
        async function loadVideos(query) {
            appContent.innerHTML = '<div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Подключение к свободному узлу сети...</div>';
            
            let success = false;
            let data = null;

            for (let i = 0; i < INSTANCES.length; i++) {
                try {
                    const response = await fetch(`${getActiveServer()}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                    if (!response.ok) throw new Error();
                    data = await response.json();
                    success = true;
                    break; 
                } catch (e) {
                    switchServer(); // Сервер упал или перегружен — мгновенно меняем узел
                }
            }

            if (success && data) {
                cachedVideos = data;
                renderFeed(data);
            } else {
                appContent.innerHTML = '<div class="loader">❌ Все резервные узлы заняты. Попробуйте нажать на лупу еще раз через пару секунд.</div>';
            }
        }

        function renderFeed(items) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "flex";
            
            if(!items || items.length === 0) {
                appContent.innerHTML = '<div class="loader">Ничего не найдено 😔</div>';
                return;
            }

            let html = '<div class="video-grid">';
            items.forEach(video => {
                if (!video.videoId) return;

                const firstLetter = video.author ? video.author.charAt(0).toUpperCase() : 'Y';
                const safeTitle = video.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                const safeChannel = video.author.replace(/'/g, "&#39;").replace(/"/g, "&quot;");

                // Генерация обложки, устойчивой к блокировкам
                const thumbUrl = (video.videoThumbnails && video.videoThumbnails.length > 0) 
                    ? video.videoThumbnails[0].url 
                    : `https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg`;

                const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#009688', '#4caf50'];
                const avatarBg = colors[Math.floor(Math.random() * colors.length)];

                html += `
                    <div class="video-card" onclick="openWatchPage('${video.videoId}', '${safeTitle}', '${safeChannel}', '${firstLetter}', '${avatarBg}')">
                        <div class="thumbnail-wrapper">
                            <img class="thumbnail" src="${thumbUrl}" alt="preview">
                        </div>
                        <div class="video-meta">
                            <div class="channel-avatar" style="background-color: ${avatarBg}">${firstLetter}</div>
                            <div class="video-details">
                                <div class="video-title">${video.title}</div>
                                <div class="video-author">${video.author}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            appContent.innerHTML = html;
        }

        // Воспроизведение через ПРЯМОЙ HTML5 туннелированный видеопоток
        function openWatchPage(id, title, channel, letter, avatarColor) {
            window.scrollTo(0, 0);
            chipsBar.style.display = "none";
            networkAttempts = 0; 

            appContent.innerHTML = `
                <div class="watch-container">
                    <div class="player-wrapper">
                        <video id="html5Player" controls autoplay playsinline></video>
                    </div>
                    <h1 class="watch-title">${title}</h1>
                    <div class="stream-status" id="statusLabel">
                        <i class="fa-solid fa-server"></i> Подключение канала передачи данных...
                    </div>
                    
                    <div class="watch-author-row">
                        <div class="author-left">
                            <div class="channel-avatar" style="background-color: ${avatarColor}">${letter}</div>
                            <div class="author-name-container">
                                <span class="author-name">${channel}</span>
                                <span class="subs-count">Режим прямого туннеля</span>
                            </div>
                            <button class="subscribe-btn" onclick="this.innerText='В подписках'; this.style.background='#272727'; this.style.color='#fff';">Подписаться</button>
                        </div>
                        
                        <div class="actions-right">
                            <div class="action-pill"><i class="fa-regular fa-thumbs-up"></i> Лайк</div>
                            <div class="action-pill"><i class="fa-solid fa-share"></i> Ссылка</div>
                            <div class="action-pill" onclick="goBackToFeed()" style="background-color: var(--text-main); color: var(--bg-main);">
                                <i class="fa-solid fa-arrow-left"></i> К ленте
                            </div>
                        </div>
                    </div>
                </div>
            `;

            initPlayerSource(id);
        }

        // Инжекция туннельной ссылки прямо в тег <video>
        function initPlayerSource(id) {
            const player = document.getElementById('html5Player');
            const statusLabel = document.getElementById('statusLabel');
            
            if (!player) return;

            // Задаем источник. itag=22 запрашивает 720p готовый mp4. local=true заставляет проксировать поток через сервер.
            const streamUrl = `${getActiveServer()}/latest_version?id=${id}&itag=22&local=true`;
            
            statusLabel.style.color = "#dfab1c";
            statusLabel.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Стрим: Поток [Узел ${currentServerIdx + 1}/${INSTANCES.length}]`;

            player.src = streamUrl;
            player.load();

            // Автоматическое исправление ошибок «на лету»
            player.onerror = function() {
                networkAttempts++;
                if (networkAttempts < INSTANCES.length) {
                    switchServer(); // Переключаем сервер в пуле
                    initPlayerSource(id); // Запускаем повторную инициализацию с новой точкой
                } else {
                    // Если высокое качество недоступно, переключаемся на легкий поток 360р (itag=18)
                    statusLabel.style.color = "#ff4444";
                    statusLabel.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Смена формата на Эко-поток...`;
                    player.src = `${getActiveServer()}/latest_version?id=${id}&itag=18&local=true`;
                    player.load();
                }
            };

            player.onplaying = function() {
                statusLabel.style.color = "#2bda7a";
                statusLabel.innerHTML = `<i class="fa-solid fa-shield-halved"></i> Защищенный скоростной туннель активен. Стабильное соединение.`;
            };
        }

        function clickChip(element, searchQuery) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            loadVideos(searchQuery);
        }

        function goBackToFeed() {
            if(cachedVideos.length > 0) {
                renderFeed(cachedVideos);
            } else {
                resetToHome();
            }
        }

        function resetToHome() {
            const firstChip = document.querySelector('.chip');
            clickChip(firstChip, 'Популярное россии');
        }

        // Старт
        resetToHome();
    </script>
</body>
</html>
