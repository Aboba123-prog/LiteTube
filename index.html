<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiteTube Premium Speed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f9f9f9; color: #0f0f0f;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5; position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 20px; font-weight: bold; color: #ff0000; cursor: pointer; user-select: none; }
        .search-box { display: flex; flex-grow: 1; max-width: 600px; margin-left: 20px; }
        .search-box input {
            width: 100%; padding: 8px 12px; border: 1px solid #ccc;
            border-radius: 20px 0 0 20px; font-size: 16px; outline: none;
        }
        .search-box button {
            padding: 8px 20px; background-color: #f8f8f8; border: 1px solid #ccc;
            border-left: none; border-radius: 0 20px 20px 0; cursor: pointer;
        }

        main { padding: 20px 15px; max-width: 1600px; margin: 0 auto; }

        .video-grid { display: flex; flex-wrap: wrap; margin: -10px; }
        .video-card { width: 100%; padding: 10px; cursor: pointer; }
        .video-card:active { opacity: 0.6; }

        @media (min-width: 500px) { .video-card { width: 50%; } }
        @media (min-width: 800px) { .video-card { width: 33.333%; } }
        @media (min-width: 1100px) { .video-card { width: 25%; } }

        .thumbnail-container {
            width: 100%; background-color: #e5e5e5; border-radius: 8px;
            overflow: hidden; position: relative; padding-top: 56.25%; 
        }
        .thumbnail {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .video-info { padding-top: 10px; }
        .video-title {
            font-size: 15px; font-weight: 500; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .channel-name { font-size: 13px; color: #606060; margin-top: 4px; }

        .player-container { max-width: 900px; margin: 0 auto; }
        .back-button {
            display: inline-block; margin-bottom: 15px; padding: 8px 16px;
            background-color: #eee; border-radius: 20px; cursor: pointer; font-size: 14px;
            user-select: none;
        }
        .back-button:active { background-color: #ddd; }
        
        /* Контейнер под видео с фиксированным соотношением сторон */
        .video-wrapper {
            width: 100%; background-color: #000; border-radius: 8px; overflow: hidden;
            position: relative; padding-top: 56.25%;
        }
        .video-wrapper video, .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        
        .player-title { margin-top: 15px; font-size: 18px; font-weight: 600; }
        .no-results { text-align: center; width: 100%; padding: 40px; color: #666; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="loadTrending()">LiteTube</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск на YouTube..." onkeypress="handleKeyPress(event)">
            <button onclick="triggerSearch()">🔍</button>
        </div>
    </header>

    <main id="app-content">
        </main>

    <script>
        const appContent = document.getElementById('app-content');
        const searchInput = document.getElementById('searchInput');

        // Стабильный и быстрый API-сервер, который проксирует потоки
        const API_BASE = "https://pipedapi.privacydev.net";
        
        // Кэш для мгновенного возврата назад без повторной загрузки из сети
        let lastSearchResults = [];

        // Поиск видеороликов
        async function fetchVideos(query) {
            appContent.innerHTML = '<div class="no-results">Поиск видео... ⚡</div>';
            try {
                const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&filter=videos`);
                if (!response.ok) throw new Error('Ошибка');
                const data = await response.json();
                
                lastSearchResults = data.items; // Сохраняем в кэш
                renderGrid(data.items);
            } catch (error) {
                appContent.innerHTML = '<div class="no-results">❌ Ошибка сети. Попробуйте ввести запрос еще раз.</div>';
                console.error(error);
            }
        }

        // Вывод сетки видео
        function renderGrid(items) {
            window.scrollTo(0, 0);
            if (!items || items.length === 0) {
                appContent.innerHTML = '<div class="no-results">Ничего не найдено 😔</div>';
                return;
            }

            let html = '<div class="video-grid">';
            items.forEach(video => {
                const videoId = video.url.split('?v=')[1];
                if (!videoId) return;
                
                const safeTitle = video.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                
                html += `
                    <div class="video-card" onclick="playVideo('${videoId}', '${safeTitle}')">
                        <div class="thumbnail-container">
                            <img class="thumbnail" src="${video.thumbnail}" alt="preview">
                        </div>
                        <div class="video-info">
                            <div class="video-title">${video.title}</div>
                            <div class="channel-name">${video.uploaderName}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            appContent.innerHTML = html;
        }

        // Включение видео через прямой обходной стрим
        async function playVideo(videoId, title) {
            window.scrollTo(0, 0);
            
            // Создаем каркас плеера со статусом загрузки
            appContent.innerHTML = `
                <div class="player-container">
                    <div class="back-button" onclick="returnToSearch()">← Назад к поиску</div>
                    <div class="video-wrapper" id="media-box">
                        <div class="no-results" style="color:#fff; position:absolute; top:35%; width:100%;">
                            Подключаем скоростной поток... 🚀
                        </div>
                    </div>
                    <h1 class="player-title">${title}</h1>
                </div>
            `;

            try {
                // Запрашиваем прямые медиа-ссылки у прокси-сервера
                const response = await fetch(`${API_BASE}/streams/${videoId}`);
                if (!response.ok) throw new Error('Поток не получен');
                const data = await response.json();

                let directStreamUrl = "";

                // 1. Пытаемся взять HLS поток (идеально для iOS Safari и ТВ)
                if (data.hls) {
                    directStreamUrl = data.hls;
                } 
                // 2. Если HLS нет, ищем обычный готовый MP4-файл со звуком
                else if (data.videoStreams) {
                    for (let i = 0; i < data.videoStreams.length; i++) {
                        const stream = data.videoStreams[i];
                        if (!stream.videoOnly && stream.mimeType && stream.mimeType.indexOf('mp4') !== -1) {
                            directStreamUrl = stream.url;
                            break;
                        }
                    }
                }

                if (!directStreamUrl) throw new Error('Нет подходящего формата');

                // Встраиваем чистый HTML5 плеер, который воспроизведет поток в обход блокировок
                document.getElementById('media-box').innerHTML = `
                    <video controls autoplay playsinline>
                        <source src="${directStreamUrl}" type="application/x-mpegURL">
                        <source src="${directStreamUrl}" type="video/mp4">
                        Ваш девайс не поддерживает прямой плеер.
                    </video>
                `;

            } catch (error) {
                console.error(error);
                // Резервный вариант, если прокси-сервер перегружен
                document.getElementById('media-box').innerHTML = `
                    <iframe 
                        src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1" 
                        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            }
        }

        // Логика управления
        function triggerSearch() {
            const query = searchInput.value.trim();
            if (query) fetchVideos(query);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                triggerSearch();
                searchInput.blur();
            }
        }

        // Мгновенный возврат к результатам из памяти (без расхода трафика)
        function returnToSearch() {
            if (lastSearchResults && lastSearchResults.length > 0) {
                renderGrid(lastSearchResults);
            } else {
                loadTrending();
            }
        }

        function loadTrending() {
            searchInput.value = '';
            fetchVideos("Популярное");
        }

        // Старт
        loadTrending();
    </script>
</body>
</html>
