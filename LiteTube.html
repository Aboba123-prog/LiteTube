<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiteTube Ultra (100% Рабочий)</title>
    
    <link rel="preconnect" href="https://img.youtube.com">
    <link rel="preconnect" href="https://www.youtube-nocookie.com">

    <style>
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        header {
            background-color: #0a0a0a;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            color: #ff3b30;
            cursor: pointer;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 10px;
            background: #222;
            color: #aaa;
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 4px;
        }
        
        .search-box {
            display: flex;
            flex-grow: 1;
            max-width: 600px;
            margin: 0 12px;
            background: #121212;
            border: 1px solid #222;
            border-radius: 10px;
            overflow: hidden;
        }
        .search-box input {
            flex-grow: 1;
            padding: 10px 14px;
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 15px;
            outline: none;
        }
        .search-box button {
            padding: 0 16px;
            border: none;
            background: #ff3b30;
            color: #fff;
            cursor: pointer;
        }
        
        .container { padding: 16px; max-width: 1400px; margin: 0 auto; }

        .player-wrapper {
            display: none;
            margin-bottom: 20px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            padding-top: 56.25%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .player-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .player-ui {
            position: absolute; top: 10px; right: 10px; z-index: 10;
        }
        .btn-close {
            background: #ff3b30; color: #fff; border: none; padding: 8px 14px;
            cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 14px;
        }

        .feed-title { font-size: 18px; margin: 0 0 16px 4px; font-weight: 700; color: #eaeaea; }
        .grid { display: flex; flex-wrap: wrap; margin: -8px; }
        .card { box-sizing: border-box; width: 100%; padding: 8px; }
        @media(min-width: 500px) { .card { width: 50%; } }
        @media(min-width: 900px) { .card { width: 33.33%; } }
        @media(min-width: 1200px) { .card { width: 25%; } }

        .thumb {
            position: relative; width: 100%; padding-top: 56.25%;
            background-color: #111; border-radius: 10px; overflow: hidden; cursor: pointer;
        }
        .thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .meta { margin-top: 8px; padding: 0 2px; cursor: pointer; }
        .title {
            font-size: 13.5px; font-weight: 600; line-height: 1.3; max-height: 2.6em;
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #fff;
        }
        .channel { font-size: 11.5px; color: #8e8e93; margin-top: 4px; }
        .msg { text-align: center; padding: 50px 20px; font-size: 15px; color: #8e8e93; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetToHome()">LiteTube <span>LIVE</span></div>
    <div class="search-box">
        <input type="text" id="search-bar" placeholder="Вставь ссылку на видео или ID...">
        <button onclick="triggerSearch()">Открыть</button>
    </div>
</header>

<div class="container">
    <div id="player-view" class="player-wrapper">
        <div class="player-ui">
            <button class="btn-close" onclick="unloadPlayer()">✕ Закрыть</button>
        </div>
        <iframe id="video-frame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <h2 id="feed-header" class="feed-title">Популярные видео (Прямой поток)</h2>
    <div id="loading-indicator" class="msg" style="display:none;">Загрузка потока...</div>
    <div id="video-feed-grid" class="grid"></div>
</div>

<script>
    // Постоянная база стабильных видео (Тренды), которые ЗАВЕДУТСЯ ВСЕГДА и ВЕЗДЕ
    const SAFE_FEEDS = [
        { videoId: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up (Official Video)', author: 'Rick Astley' },
        { videoId: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE (강남스타일) M/V', author: 'officialpsy' },
        { videoId: 'jNQXAC9IVRw', title: 'Me at the zoo (First YouTube Video)', author: 'jawed' },
        { videoId: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', author: 'Luis Fonsi' },
        { videoId: '2Vv-BfVoq4g', title: 'Ed Sheeran - Shape of You (Official Music Video)', author: 'Ed Sheeran' },
        { videoId: 'CevxZvSJLk8', title: 'Roar - Katy Perry (Official Music Video)', author: 'Katy Perry' }
    ];

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : (url.length === 11 ? url : null);
    }

    function loadMainFeed() {
        document.getElementById('feed-header').innerText = 'Рекомендовано для старых устройств';
        renderGrid(SAFE_FEEDS);
    }

    function triggerSearch() {
        const query = document.getElementById('search-bar').value.trim();
        if (!query) return;

        const directId = extractVideoId(query);
        if (directId) {
            startPlayback(directId);
            document.getElementById('search-bar').value = '';
        } else {
            // Если ввели текст, а не ссылку, генерируем мгновенный запуск через поиск YouTube, чтобы не зависеть от прокси
            document.getElementById('video-feed-grid').innerHTML = `
                <div class="msg" style="width:100%">
                    <p>Для 100% стабильности вставьте точную ссылку на видео или его ID (например: dQw4w9WgXcQ)</p>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(query)}" target="_blank" style="display:inline-block; background:#222; border:1px solid #333; color:#fff; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600;">Искать это на YouTube ↗</a>
                </div>`;
        }
    }

    function renderGrid(list) {
        const grid = document.getElementById('video-feed-grid');
        grid.innerHTML = '';
        const frag = document.createDocumentFragment();

        list.forEach(v => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="thumb" onclick="startPlayback('${v.videoId}')">
                    <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" alt="Pre" loading="lazy">
                </div>
                <div class="meta" onclick="startPlayback('${v.videoId}')">
                    <div class="title">${v.title}</div>
                    <div class="channel">${v.author}</div>
                </div>`;
            frag.appendChild(card);
        });
        grid.appendChild(frag);
    }

    function startPlayback(id) {
        const frame = document.getElementById('video-frame');
        // Используем ультра-стабильное незаблокированное зеркало официального эмбеда
        frame.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&controls=1`;
        document.getElementById('player-view').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function unloadPlayer() {
        document.getElementById('video-frame').src = '';
        document.getElementById('player-view').style.display = 'none';
    }

    function resetToHome() {
        document.getElementById('search-bar').value = '';
        unloadPlayer();
        loadMainFeed();
    }

    document.getElementById('search-bar').addEventListener('keypress', e => { if (e.key === 'Enter') triggerSearch(); });
    
    loadMainFeed();
</script>

</body>
</html>
